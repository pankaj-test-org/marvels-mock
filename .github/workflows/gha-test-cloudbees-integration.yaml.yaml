name: register-artifact-from-github

on:
  push

jobs:
  register-artifact:
    name: Docker Build & Artifact Registration
    if: vars.SKIP_GHA != 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set image tag
        id: set-tag
        run: |
          echo "IMAGE_TAG=1.0.${{ github.run_number }}" >> $GITHUB_ENV
          echo "Image tag: 1.0.${{ github.run_number }}"

      - name: Build Docker Image
        run: |
          echo "Building Docker image with tag: ${{ env.IMAGE_TAG }}"
          docker build -t pankajydev/gha-test-image:${{ env.IMAGE_TAG }} .

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker Image
        run: |
          echo "Pushing Docker image..."
          docker push pankajydev/gha-test-image:${{ env.IMAGE_TAG }}

      - name: Get Image Digest
        id: get-digest
        run: |
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' pankajydev/gha-test-image:${{ env.IMAGE_TAG }} | cut -d@ -f2)
          echo "IMAGE_DIGEST=${DIGEST}" >> $GITHUB_ENV
          echo "Image digest: ${DIGEST}"

      - name: Register build artifact
        id: register-build-artifact
        uses: cloudbees-io-gha/register-build-artifact@v3
        with:
          cloudbees-url: ${{ vars.CLOUDBEES_API_URL || 'https://api.saas-qa.beescloud.com' }}
          name: gha-test-image
          url: "docker.io/pankajydev/gha-test-image:${{ env.IMAGE_TAG }}"
          version: ${{ env.IMAGE_TAG }}
          digest: ${{ env.IMAGE_DIGEST }}

      - name: Print artifact id
        run: |
          echo '${{ steps.register-build-artifact.outputs.cbp_artifact_id }}'

      - name: Register deployed artifact
        uses: docker://public.ecr.aws/cloudbees/actions/gha-register-deployed-artifact:main-8d819ee6c37734d240bc3e399c7515d85aa14f76
        id: register-deployed-artifact
        env:
          ARTIFACT_NAME: "gha-test-image"
          ARTIFACT_ID: ${{ steps.register-build-artifact.outputs.cbp_artifact_id }}
          CLOUDBEES_API_URL: ${{ vars.CLOUDBEES_API_URL || 'https://api.saas-preprod.beescloud.com' }}
          ARTIFACT_TYPE: "docker"
          TARGET_ENVIRONMENT: "pan101"
          ARTIFACT_DIGEST: ${{ env.IMAGE_DIGEST }}
          DEPLOYMENT_LABELS: "pan1"

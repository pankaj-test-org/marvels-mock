name: Jenkins CI

on:
  push:
    branches:
      - main
      - master

jobs:
  trigger-jenkins:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Trigger Jenkins via Webhook
      env:
        JENKINS_WEBHOOK_URL: ${{ secrets.JENKINS_WEBHOOK_URL }}
      run: |
        # Send webhook to Jenkins Generic Webhook Trigger
        # No authentication required if webhook endpoint is open

        PAYLOAD=$(cat <<EOF
        {
          "repository": "${{ github.repository }}",
          "ref": "${{ github.ref }}",
          "sha": "${{ github.sha }}",
          "branch": "${{ github.ref_name }}",
          "author": "${{ github.actor }}",
          "commit_message": "${{ github.event.head_commit.message }}",
          "run_id": "${{ github.run_id }}",
          "run_number": "${{ github.run_number }}"
        }
        EOF
        )

        echo "Triggering Jenkins webhook..."

        RESPONSE=$(curl -X POST \
          -H "Content-Type: application/json" \
          -d "$PAYLOAD" \
          -w "\n%{http_code}" \
          "$JENKINS_WEBHOOK_URL" 2>&1)

        HTTP_CODE=$(echo "$RESPONSE" | tail -n1)

        if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ] || [ "$HTTP_CODE" = "202" ]; then
          echo "✅ Jenkins webhook triggered successfully (HTTP $HTTP_CODE)"
          echo "Jenkins will report status back to GitHub when job completes"
        else
          echo "⚠️  Webhook response: HTTP $HTTP_CODE"
          echo "$RESPONSE"
        fi

    - name: Wait for Jenkins Status
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        COMMIT_SHA="${{ github.sha }}"
        REPO="${{ github.repository }}"

        echo "⏳ Waiting for Jenkins to report status..."
        echo "Commit: $COMMIT_SHA"

        MAX_WAIT=600  # 10 minutes
        ELAPSED=0

        while [ $ELAPSED -lt $MAX_WAIT ]; do
          sleep 10
          ELAPSED=$((ELAPSED + 10))

          # Query GitHub API for commit statuses
          RESPONSE=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/$REPO/commits/$COMMIT_SHA/status")

          # Get overall state
          STATE=$(echo "$RESPONSE" | grep -o '"state":"[^"]*"' | head -1 | cut -d'"' -f4)

          # Get Jenkins-specific status (adjust context name if needed)
          STATUSES=$(echo "$RESPONSE" | grep -o '"context":"[^"]*".*"state":"[^"]*"' | grep -i "jenkins\|continuous-integration" || echo "")

          if [ ! -z "$STATUSES" ]; then
            JENKINS_STATE=$(echo "$STATUSES" | grep -o '"state":"[^"]*"' | head -1 | cut -d'"' -f4)

            echo "Jenkins status: $JENKINS_STATE (${ELAPSED}s elapsed)"

            if [ "$JENKINS_STATE" = "success" ]; then
              echo "✅ Jenkins build succeeded!"
              echo "### ✅ Jenkins Build Successful" >> $GITHUB_STEP_SUMMARY
              exit 0
            elif [ "$JENKINS_STATE" = "failure" ] || [ "$JENKINS_STATE" = "error" ]; then
              echo "❌ Jenkins build failed!"
              echo "### ❌ Jenkins Build Failed" >> $GITHUB_STEP_SUMMARY
              exit 1
            fi
          else
            echo "⏳ Waiting for Jenkins to start reporting... (${ELAPSED}s)"
          fi
        done

        echo "⚠️  Timeout: Jenkins did not report status within ${MAX_WAIT}s"
        echo "Check Jenkins configuration and GitHub credentials"
        exit 1

    - name: Report Completion
      if: always()
      run: |
        echo "### Jenkins Job Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
        echo "- **Branch**: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
        echo "- **Triggered By**: @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY

name: Test Failure Check

on:
  push:
    branches:
      - test-pr-apr-10-26
  pull_request:
  workflow_dispatch:

jobs:
  intentional-failure:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Intentionally fail (not blocking Jenkins)
        run: |
          echo "This check fails intentionally but does NOT block Jenkins"
          exit 1
name: CI Checks

on:
  push:
    branches:
      - test-pr-apr-10-26
  pull_request:
  workflow_dispatch:
  repository_dispatch:
    types: [jenkins-rerun]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run checks
        env:
          GH_CHECK_FAIL: ${{ vars.GH_CHECK_FAIL || 'false' }}
        run: |
          echo "GITHUB_CHECK_FAIL=${GITHUB_CHECK_FAIL}"

          if [ "${GITHUB_CHECK_FAIL}" = "true" ]; then
            echo "❌ GITHUB_CHECK_FAIL=true - failing intentionally"
            echo "To pass: Set repository variable GITHUB_CHECK_FAIL=false"
            exit 1
          else
            echo "✅ GitHub checks passed"
            echo "GITHUB_CHECK_FAIL=${GITHUB_CHECK_FAIL}"
            exit 0
          fi